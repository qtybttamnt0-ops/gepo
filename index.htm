<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آلة حاسبة بسيطة</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; margin: 0; }
        .calc { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; height: 40px; font-size: 20px; text-align: center; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; height: 40px; font-size: 18px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="calc">
    <h3>آلة حاسبة</h3>
    <input type="text" id="screen" placeholder="0">
    <button onclick="checkCode()">احسب</button>
</div>

<script>
    function checkCode() {
        var val = document.getElementById("screen").value;
        // إذا كتبت 4 أصفار وضغطت احسب، سيفتح الإنستغرام فوراً
        if (val === "0000") {
            window.location.href = "https://www.instagram.com";
        } else {
            alert("النتيجة: " + (eval(val) || 0)); // حاسبة عادية لأي أرقام أخرى
        }
    }
</script>

</body>
</html>
