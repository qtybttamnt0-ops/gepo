<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آلة حاسبة متطورة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #eef2f3; margin: 0; }
        .calculator { background: #333; padding: 20px; border-radius: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.3); width: 300px; }
        #screen { width: 100%; height: 60px; font-size: 28px; text-align: left; margin-bottom: 15px; border: none; background: #222; color: #fff; border-radius: 10px; padding: 5px 10px; box-sizing: border-box; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 55px; font-size: 22px; border: none; border-radius: 10px; cursor: pointer; background: #555; color: white; transition: 0.2s; }
        button:hover { background: #666; }
        .operator { background: #f0a03e; color: white; }
        .operator:hover { background: #ffb85c; }
        .equal { background: #2ecc71; color: white; grid-column: span 2; }
        .equal:hover { background: #27ae60; }
        .clear { background: #e74c3c; color: white; }
        .clear:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="screen" readonly placeholder="0">
    
    <div class="buttons">
        <button class="clear" onclick="clearScreen()">C</button>
        <button onclick="press('/')">/</button>
        <button onclick="press('*')">*</button>
        <button onclick="press('-')">-</button>
        
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="operator" onclick="press('+')">+</button>
        
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('0')">0</button>
        
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let screen = document.getElementById("screen");

    function press(num) {
        if (screen.value === "0") {
            screen.value = num;
        } else {
            screen.value += num;
        }
    }

    function clearScreen() {
        screen.value = "";
    }

    function calculate() {
        if (screen.value === "0000") {
            // محاولة فتح تطبيق إنستغرام مباشرة على الهاتف
            window.location.href = "instagram://app";
            
            // احتياطاً: إذا لم يفتح التطبيق خلال ثانية (مثلاً لو كنت جالس تجرب من الكمبيوتر)، يفتح موقع انستا بالمتصفح
            setTimeout(function() {
                window.location.href = "https://www.instagram.com";
            }, 1000);
            
        } else {
            try {
                screen.value = eval(screen.value) || "0";
            } catch (e) {
                screen.value = "خطأ";
            }
        }
    }
</script>

</body>
</html>
